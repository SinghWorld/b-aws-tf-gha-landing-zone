name: Terraform Drift Detection - Landing Zone

on:
  schedule:
    - cron: "0 22 * * *" # daily at 8am AEST (22:00 UTC previous day)
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  issues: write

env:
  TF_VERSION: "1.11.0"  # >= 1.11 required for use_lockfile (S3 native state locking, GA in 1.11)
  WORKING_DIR: "landing-zone/environments/hub"

jobs:
  drift-check:
    name: Check for drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # TEMP DEBUG: dump OIDC token claims so we can see exactly what sub/aud
      # GitHub is sending. Remove once trust-policy mismatch is diagnosed.
      - name: 'Debug: dump OIDC token claims'
        id: oidc-debug
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const token = await core.getIDToken('sts.amazonaws.com');
              const payload = JSON.parse(Buffer.from(token.split('.')[1], 'base64url').toString());
              console.log('=== OIDC token claims ===');
              console.log(JSON.stringify(payload, null, 2));
              console.log('=== End OIDC token claims ===');
              core.info(`OIDC sub:        ${payload.sub}`);
              core.info(`OIDC aud:        ${payload.aud}`);
              core.info(`OIDC event_name: ${payload.event_name}`);
              core.info(`OIDC ref:        ${payload.ref}`);
              core.info(`OIDC repository: ${payload.repository}`);
            } catch (e) {
              core.warning(`Failed to dump OIDC claims: ${e.message}`);
            }

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_OIDC_ROLE_ARN }}
          aws-region: us-east-1

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init

      - name: Terraform Plan (detect drift)
        id: plan
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform plan -detailed-exitcode -no-color -out=drift.tfplan || echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Open issue if drift detected
        if: steps.plan.outputs.exit_code == '2'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Drift detected in landing zone - ${new Date().toISOString().slice(0,10)}`,
              body: "Terraform plan detected drift between state and live infrastructure. Check the workflow run for details.",
              labels: ["drift", "infrastructure"]
            });
