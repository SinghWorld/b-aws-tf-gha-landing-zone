name: Terraform Drift Detection - Landing Zone

on:
  schedule:
    - cron: "0 22 * * *" # daily at 8am AEST (22:00 UTC previous day)
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  issues: write

env:
  TF_VERSION: "1.7.5"
  WORKING_DIR: "landing-zone/environments/hub"

jobs:
  drift-check:
    name: Check for drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_OIDC_ROLE_ARN }}
          aws-region: us-east-1

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init

      - name: Terraform Plan (detect drift)
        id: plan
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform plan -detailed-exitcode -no-color -out=drift.tfplan || echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Open issue if drift detected
        if: steps.plan.outputs.exit_code == '2'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Drift detected in landing zone - ${new Date().toISOString().slice(0,10)}`,
              body: "Terraform plan detected drift between state and live infrastructure. Check the workflow run for details.",
              labels: ["drift", "infrastructure"]
            });
