name: Terraform Drift Detection - Landing Zone

on:
  schedule:
    - cron: "0 22 * * *" # daily at 8am AEST (22:00 UTC previous day)
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC auth to AWS
  contents: read
  issues: write     # required to open the drift issue

env:
  TF_VERSION: "1.11.0"  # >= 1.11 required for use_lockfile (S3 native state locking, GA in 1.11)
  WORKING_DIR: "landing-zone/environments/hub"

jobs:
  drift-check:
    name: Check for drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_OIDC_ROLE_ARN }}
          aws-region: us-east-1

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init

      # `terraform plan -detailed-exitcode` exit codes:
      #   0 = no changes (state matches live infra) — clean run
      #   1 = error (auth, syntax, transient AWS API issue)
      #   2 = changes present (drift detected)
      # We disable errexit for this step so the non-zero exit doesn't
      # terminate the script before we record the code into $GITHUB_OUTPUT.
      - name: Terraform Plan (detect drift)
        id: plan
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          set +e
          terraform plan -detailed-exitcode -no-color -out=drift.tfplan
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      # When drift is detected, render the binary plan into both a
      # human-readable text file (for the workflow summary and issue body)
      # and a structured JSON file (for the parsed resource-change list).
      - name: Render plan as text + JSON
        if: steps.plan.outputs.exit_code == '2'
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform show -no-color drift.tfplan > drift-plan.txt
          terraform show -json drift.tfplan | jq '.' > drift-plan.json

      # The step summary is the first thing you see when you open the
      # workflow run in the Actions tab. Putting the drift diff here makes
      # the problem obvious without having to scroll through the log.
      - name: Publish drift summary
        if: steps.plan.outputs.exit_code == '2'
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          {
            echo "## :rotating_light: Terraform drift detected"
            echo ""
            echo "Live AWS infrastructure has drifted from the Terraform state in \`landing-zone/environments/hub\`."
            echo ""
            echo "**Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo ""
            echo "### Plan output"
            echo ""
            echo '```hcl'
            cat drift-plan.txt
            echo '```'
            echo ""
            echo "Full machine-readable plan and binary are attached as workflow artifacts (\`drift-plan\`)."
          } >> "$GITHUB_STEP_SUMMARY"

      # Mirror what terraform-plan-apply.yml and destroy.yml do: ship the
      # plan binary alongside text + JSON so reviewers can download and
      # inspect it locally with `terraform show`.
      - name: Upload plan artifacts
        if: steps.plan.outputs.exit_code == '2'
        uses: actions/upload-artifact@v4
        with:
          name: drift-plan
          path: |
            ${{ env.WORKING_DIR }}/drift.tfplan
            ${{ env.WORKING_DIR }}/drift-plan.txt
            ${{ env.WORKING_DIR }}/drift-plan.json
          retention-days: 30
          if-no-files-found: error

      # Open a GitHub issue that contains the parsed resource-change list
      # and the full plan — no more "check the workflow run" hand-wave.
      - name: Open issue on drift
        if: steps.plan.outputs.exit_code == '2'
        uses: actions/github-script@v7
        env:
          WORKING_DIR: ${{ env.WORKING_DIR }}
          RUN_ID: ${{ github.run_id }}
          SERVER_URL: ${{ github.server_url }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const workingDir = process.env.WORKING_DIR;
            const runUrl = `${process.env.SERVER_URL}/${context.repo.owner}/${context.repo.repo}/actions/runs/${process.env.RUN_ID}`;
            const date = new Date().toISOString().slice(0, 10);

            const planText = fs.readFileSync(path.join(workingDir, 'drift-plan.txt'), 'utf8');

            // resource_changes is a top-level array on terraform show -json output.
            // Each entry has `address` and `change.actions` (array of
            // "no-op"|"create"|"read"|"update"|"delete").
            let changesList = '_No resource changes detected._';
            try {
              const planJson = JSON.parse(
                fs.readFileSync(path.join(workingDir, 'drift-plan.json'), 'utf8')
              );
              const changes = (planJson.resource_changes || []).map(rc => {
                const actions = (rc.change && Array.isArray(rc.change.actions))
                  ? rc.change.actions.join(', ')
                  : 'unknown';
                return `- \`${rc.address}\` → ${actions}`;
              });
              if (changes.length > 0) changesList = changes.join('\n');
            } catch (err) {
              changesList = `_Failed to parse plan JSON: ${err.message}_`;
            }

            const body = [
              '## :rotating_light: Terraform drift detected',
              '',
              `Detected on **${date}** in \`landing-zone/environments/hub\`.`,
              '',
              `**Workflow run:** [${process.env.RUN_ID}](${runUrl})`,
              '',
              '### Resource changes',
              '',
              changesList,
              '',
              '### Plan output',
              '',
              '```hcl',
              planText,
              '```',
              '',
              '### Remediation',
              '',
              '1. Review the drift above to determine whether it is expected.',
              '2. If the live infrastructure should be reverted, open a PR with the necessary changes and let the apply workflow reconcile state.',
              '3. If the live infrastructure is correct, update state (e.g. `terraform import` / `terraform state rm`) and merge a PR so the new reality is reflected in code.',
              '',
              'Artifacts (`drift-plan`) attached to the workflow run contain the binary, text, and JSON plans for forensic analysis.',
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Drift detected in landing zone - ${date}`,
              body,
              labels: ['drift', 'infrastructure'],
            });

      # Fail the job so the Actions tab shows a red ❌ for this run.
      # The GitHub issue and step summary are already populated by the
      # previous steps, so this is purely a visibility signal.
      - name: Fail on drift
        if: steps.plan.outputs.exit_code == '2'
        run: |
          echo "::error::Terraform drift detected. See the workflow summary and the opened issue for details."
          exit 1

      # Fail the job on real plan errors too (exit code 1) — silent
      # success on auth/syntax failures would be misleading.
      - name: Fail on plan error
        if: steps.plan.outputs.exit_code == '1'
        run: |
          echo "::error::terraform plan failed. See the workflow log for the underlying error."
          exit 1
