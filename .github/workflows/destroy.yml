name: Terraform Destroy - Landing Zone

# Manual trigger only. The required `confirm` input is the only safety gate:
# jobs only run if `inputs.confirm == 'DESTROY-LAB'` (case-sensitive).
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type DESTROY-LAB to confirm (case-sensitive)'
        required: true
        type: string

# Serialize runs of THIS workflow. cancel-in-progress: false so an
# in-flight destroy is never silently killed mid-apply. The state lock
# already prevents concurrent destroy + plan-apply, but two concurrent
# destroys would still race the lock acquisition step.
concurrency:
  group: terraform-destroy-landing-zone
  cancel-in-progress: false

permissions:
  id-token: write   # required for OIDC auth to AWS
  contents: read

env:
  TF_VERSION: "1.11.0"
  WORKING_DIR: "landing-zone/environments/hub"

jobs:
  # ---------- 1. Generate destroy plan ----------
  plan:
    name: Terraform Destroy Plan
    if: inputs.confirm == 'DESTROY-LAB'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_OIDC_ROLE_ARN }}
          aws-region: us-east-1

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init

      # The destroy workflow runs as the OIDC role, so we cannot let Terraform
      # destroy that role mid-run or we'd lose credentials for the rest of the
      # apply. Terraform has no `-exclude` flag (that's OpenTofu-only), and
      # `lifecycle.prevent_destroy = true` causes `terraform destroy` to error
      # out without destroying anything. So we remove the OIDC resources from
      # state before generating the destroy plan — Terraform only destroys
      # what's in state, so the OIDC role and provider survive in AWS.
      #
      # The OIDC resources still exist in AWS after this workflow completes,
      # but they are no longer tracked by Terraform state. To run CI again,
      # either re-import them into state (see modules/github-oidc/main.tf for
      # the import commands) or run scripts/01.setup_s3-backend.sh + a local
      # apply to re-bootstrap. The `|| true` makes this step idempotent so
      # the workflow still succeeds if state was already cleaned up.
      - name: Remove OIDC resources from state (so destroy skips them)
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform state rm \
            module.github_oidc.aws_iam_openid_connect_provider.github || true
          terraform state rm \
            module.github_oidc.aws_iam_role.github_actions || true
          terraform state rm \
            module.github_oidc.aws_iam_role_policy.iam_management || true
          terraform state rm \
            module.github_oidc.aws_iam_role_policy_attachment.power_user || true

      - name: Terraform Destroy Plan
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform plan -destroy -no-color -out=tfplan-destroy.binary

      - name: Upload destroy plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-destroy
          path: ${{ env.WORKING_DIR }}/tfplan-destroy.binary
          retention-days: 5

  # ---------- 2. Apply the destroy plan ----------
  # `environment: production` adds a required-reviewer approval gate on
  # top of the `DESTROY-LAB` confirm input. Configure reviewers on the
  # `production` environment in repo settings; otherwise the gate is a
  # no-op. This mirrors the apply gate used in terraform-plan-apply.yml.
  destroy:
    name: Terraform Destroy
    needs: plan
    if: inputs.confirm == 'DESTROY-LAB'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_OIDC_ROLE_ARN }}
          aws-region: us-east-1

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init

      - name: Download destroy plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-destroy
          path: ${{ env.WORKING_DIR }}

      # Applies the EXACT plan produced by the `plan` job. State was already
      # mutated by the `state rm` step in the plan job, so the state serial
      # baked into the plan matches the current state.
      #
      # NOTE: do NOT add `-destroy` here. The plan file already encodes a
      # destroy plan, and `-destroy` is a planning-mode flag that Terraform
      # rejects (or, on older versions, silently ignores) when a saved
      # plan file is supplied. See hashicorp/terraform#38698.
      - name: Terraform Destroy (using saved plan)
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform apply -auto-approve tfplan-destroy.binary
