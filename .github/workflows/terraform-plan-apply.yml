name: Terraform Plan & Apply - Landing Zone

on:
  pull_request:
    branches: [main]
    paths:
      - "landing-zone/environments/hub/**"
      - "landing-zone/modules/**"
  push:
    branches: [main]
    paths:
      - "landing-zone/environments/hub/**"
      - "landing-zone/modules/**"
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC auth to AWS
  contents: read
  pull-requests: write

env:
  TF_VERSION: "1.11.0"  # >= 1.11 required for use_lockfile (S3 native state locking, GA in 1.11)
  WORKING_DIR: "landing-zone/environments/hub"

jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_OIDC_ROLE_ARN }}
          aws-region: us-east-1

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init

      - name: Terraform Validate
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform plan -no-color -out=tfplan.binary
        continue-on-error: false

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.WORKING_DIR }}/tfplan.binary
          retention-days: 5

  apply:
    name: Terraform Apply
    needs: plan
    # Apply on push to main AND on manual workflow_dispatch against main.
    # NEVER apply on pull_request — that's the review-time signal, not a
    # merge signal. The `production` environment still requires manual
    # approval before the apply step runs.
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment: production # add a manual approval gate on this environment in repo settings
    # Applies the exact plan reviewed on the PR, not a fresh one - this
    # avoids "approved one plan, applied a different one" drift. If state
    # changed between plan and apply (e.g. someone else applied in between),
    # Terraform will refuse to apply a stale plan and you'll need to re-run.
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_OIDC_ROLE_ARN }}
          aws-region: us-east-1

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ env.WORKING_DIR }}

      - name: Terraform Apply (using saved plan)
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform apply -auto-approve tfplan.binary
